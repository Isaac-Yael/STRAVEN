<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Straven — Catálogo Mayorista</title>
<link rel="icon" href="imgs/logo_ch.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header" id="top">
  <div class="header-inner">
    <a href="#top" class="brand">
      <img src="imgs/logo.webp" alt="Straven" class="brand-logo">
    </a>
    <div class="header-tagline">Catálogo Mayorista</div>
    <div class="header-actions">
      <button class="cart-toggle" id="cartToggle" aria-label="Abrir carrito">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="cart-icon">
          <path d="M3 4H5L5.6 7M5.6 7H21L18 14H7.5M5.6 7L7.5 14M7.5 14L6.3 17H19" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="20" r="1.4" fill="currentColor"/>
          <circle cx="18" cy="20" r="1.4" fill="currentColor"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
  <nav class="cat-nav" id="catNav" aria-label="Categorías">
    <div class="cat-nav-inner" id="catNavInner"></div>
  </nav>
</header>

<!-- ===== CATALOG ===== -->
<main id="catalog"></main>

<!-- ===== FOOTER ===== -->
<footer class="site-footer">
  <img src="imgs/logo.webp" alt="Straven" class="footer-logo">
  <p>Catálogo de mayoreo · Los precios incluyen IVA · Sujetos a cambio sin previo aviso</p>
</footer>

<!-- ===== PRODUCT MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="productModal" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Cerrar">&times;</button>
    <div class="modal-grid">
      <div class="modal-gallery">
        <div class="gallery-main">
          <button class="gallery-arrow gallery-arrow-left" id="galleryPrev" aria-label="Anterior">&#8249;</button>
          <img src="" alt="" id="galleryMainImg">
          <button class="gallery-arrow gallery-arrow-right" id="galleryNext" aria-label="Siguiente">&#8250;</button>
        </div>
        <div class="gallery-thumbs" id="galleryThumbs"></div>
      </div>
      <div class="modal-info">
        <div class="modal-brand-row">
          <img src="" alt="" id="modalBrandLogo" class="modal-brand-logo">
          <span class="modal-category" id="modalCategory"></span>
        </div>
        <h2 class="modal-title" id="modalTitle"></h2>
        <span class="modal-promo" id="modalPromo"></span>

        <table class="price-tiers" id="priceTiers">
          <tbody></tbody>
        </table>

        <div class="modal-current-price">
          <span class="modal-price-label">Tu precio actual</span>
          <span class="modal-price-value" id="modalCurrentPrice">$0.00 <small>c/u</small></span>
        </div>
        <p class="modal-upsell" id="modalUpsell"></p>

        <div class="modal-qty-row">
          <div class="stepper">
            <button class="step-btn" id="modalQtyMinus" aria-label="Restar">−</button>
            <input type="number" id="modalQtyInput" value="1" min="1">
            <button class="step-btn" id="modalQtyPlus" aria-label="Sumar">+</button>
          </div>
          <button class="btn btn-primary" id="modalAddBtn">Agregar al carrito</button>
        </div>

        <button class="btn btn-mixed" id="modalMixedBtn"></button>
      </div>
    </div>
  </div>
</div>

<!-- ===== CART DRAWER ===== -->
<div class="cart-overlay" id="cartOverlay"></div>
<aside class="cart-drawer" id="cartDrawer" aria-label="Carrito de compras">
  <div class="cart-header">
    <h2>Tu pedido</h2>
    <button class="cart-close" id="cartClose" aria-label="Cerrar carrito">&times;</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty" id="cartEmpty">
      <p>Tu carrito está vacío.</p>
      <p class="cart-empty-sub">Agrega productos para armar tu pedido de mayoreo.</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cartTotal">$0.00</span>
    </div>
    <button class="btn btn-primary btn-block" id="cartWhatsappBtn">Enviar pedido por WhatsApp</button>
    <button class="btn-text" id="cartClearBtn">Vaciar carrito</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<!-- ===== WHATSAPP FLOTANTE ===== -->
<a href="#" id="whatsappFloat" class="whatsapp-float" target="_blank" rel="noopener" aria-label="Ayuda por WhatsApp">
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
    <path d="M16.004 3C9.094 3 3.49 8.6 3.49 15.51c0 2.59.76 4.99 2.07 7.01L4 29l6.65-1.51a12.4 12.4 0 0 0 5.35 1.22h.005c6.91 0 12.515-5.6 12.515-12.51C28.52 9.31 22.914 3 16.004 3Zm0 22.79h-.004a10.27 10.27 0 0 1-5.24-1.43l-.376-.224-3.946.897.85-3.84-.246-.395a10.24 10.24 0 0 1-1.566-5.29c0-5.66 4.61-10.27 10.532-10.27 2.815 0 5.46 1.1 7.45 3.09a10.46 10.46 0 0 1 3.08 7.45c0 5.66-4.61 10.27-10.534 10.27Zm5.79-7.69c-.317-.159-1.876-.926-2.167-1.032-.29-.106-.502-.159-.713.16-.21.318-.818 1.032-1.003 1.244-.184.211-.37.238-.687.08-.317-.16-1.337-.493-2.547-1.572-.942-.84-1.578-1.877-1.763-2.195-.184-.318-.02-.49.14-.65.158-.158.343-.41.515-.616.172-.205.23-.353.343-.59.114-.238.058-.444-.05-.62-.106-.176-.74-1.78-1.013-2.434-.27-.65-.547-.562-.75-.572l-.638-.011c-.21 0-.554.08-.85.396-.296.317-1.13 1.105-1.13 2.694 0 1.589 1.156 3.124 1.317 3.34.16.218 2.21 3.378 5.358 4.6 3.148 1.222 3.148.815 4.166.764 1.017-.05 3.32-1.353 3.79-2.665.47-1.312.47-2.44.33-2.665-.142-.224-.514-.343-.831-.502Z"/>
  </svg>
</a>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
